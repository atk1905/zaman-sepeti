name: Bootstrap Supabase

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply SQL migration
        id: migrate
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: rolmtojoocllqujtswes
        run: |
          set -euo pipefail
          host=aws-0-ap-northeast-1.pooler.supabase.com
          users=("postgres.${SUPABASE_PROJECT_REF}" "postgres")
          for user in "${users[@]}"; do
            echo "Trying pooler host: $host as $user"
            if psql "host=$host port=5432 dbname=postgres user=$user sslmode=require" -v ON_ERROR_STOP=1 -c 'select 1' >/tmp/psql_probe.out 2>/tmp/psql_probe.err; then
              echo "Selected pooler host: $host as $user"
              psql "host=$host port=5432 dbname=postgres user=$user sslmode=require" \
                -v ON_ERROR_STOP=1 \
                -f supabase/migrations/0001_init.sql
              echo "host=$host" >> "$GITHUB_OUTPUT"
              echo "user=$user" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "Host/user failed: $host / $user"
              cat /tmp/psql_probe.err
            fi
          done
          echo "No pooler user worked" >&2
          exit 1

      - name: Verify public categories
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: rolmtojoocllqujtswes
          SUPABASE_POOLER_HOST: ${{ steps.migrate.outputs.host }}
          SUPABASE_POOLER_USER: ${{ steps.migrate.outputs.user }}
        run: |
          psql "host=$SUPABASE_POOLER_HOST port=5432 dbname=postgres user=$SUPABASE_POOLER_USER sslmode=require" \
            -v ON_ERROR_STOP=1 \
            -c "select count(*) as categories from public.categories;"

      - name: Summary
        run: |
          {
            echo 'Supabase bootstrap workflow finished.'
            echo ''
            echo '- SQL migration applied from supabase/migrations/0001_init.sql'
            echo '- Categories table verified'
          } >> "$GITHUB_STEP_SUMMARY"
